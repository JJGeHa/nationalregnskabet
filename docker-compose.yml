services:
  etl:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m danish_economy.etl.ingest.hello
    volumes:
      - ./data:/app/data
    depends_on: []

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn danish_economy.api.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      etl:
        condition: service_completed_successfully

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
