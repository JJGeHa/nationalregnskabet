# Mapping from Finanslov paragraf number to dim_institution entity_key.
#
# Ministerier change between governments. This mapping reflects the
# current government (as of 2024). Paragraffer that are not ministerier
# (Kongen, Folketinget, reserves, debt, taxes) use FL_PAR_xx entity keys.
#
# When a new government reorganises ministries, update both this file and
# dim_institution.yaml, then rebuild.

paragraffer:
  # Monarchy & Parliament
  "01": {entity_key: FL_PAR_01, name_da: "Dronningen (Kongehuset)", name_en: "The Monarch", inst_type: "paragraf"}
  "02": {entity_key: FL_PAR_02, name_da: "Medlemmer af det kongelige hus", name_en: "Royal House Members", inst_type: "paragraf"}
  "03": {entity_key: FL_PAR_03, name_da: "Folketinget", name_en: "The Danish Parliament", inst_type: "paragraf"}

  # Ministerier (mapped to existing dim_institution entities)
