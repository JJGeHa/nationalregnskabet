    unit: DKK_mio
    category: revenue
    subcategory: tax
    source_system: dst
    source_identifier: "OFF3:UI=2.8. Løbende indkomst- og formueskatter"

  - metric_code: public_balance
    name_da: Offentlig saldo
    name_en: Public sector balance
    unit: DKK_mio
    category: balance
    subcategory: net
    source_system: dst
    source_identifier: "OFF3:UI=2.19. Offentlig saldo=fordringserhvervelse, netto (2.17-1.17)"

  - metric_code: public_interest
    name_da: Renter mv.
