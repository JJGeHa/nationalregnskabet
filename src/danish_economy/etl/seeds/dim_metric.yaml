# dim_metric seed data
#
# Each metric maps to a specific measure from an upstream source.
# source_identifier provides lineage: which table + dimension value this came from.
# The category text must match the silver OFF3 category column exactly.

metrics:
  - metric_code: public_total_expenditure
    name_da: Drifts- og kapitaludgifter i alt
    name_en: Total public expenditure
    unit: DKK_mio
    category: expenditure
    subcategory: total
    source_system: dst
    source_identifier: "OFF3:UI=1.17. Drifts- og kapitaludgifter i alt (8+16)"

  - metric_code: public_operating_expenditure
    name_da: Driftsudgifter i alt
    name_en: Total operating expenditure
    unit: DKK_mio
    category: expenditure
    subcategory: operating
    source_system: dst
    source_identifier: "OFF3:UI=1.8. Driftsudgifter i alt (1+2+3+4+5+6+7)"

  - metric_code: public_employee_compensation
    name_da: Aflønning af ansatte
    name_en: Employee compensation
    unit: DKK_mio
    category: expenditure
    subcategory: compensation
    source_system: dst
    source_identifier: "OFF3:UI=1.1. Aflønning af ansatte"

  - metric_code: public_consumption
    name_da: Forbrug i produktionen
    name_en: Intermediate consumption
    unit: DKK_mio
    category: expenditure
    subcategory: consumption
    source_system: dst
    source_identifier: "OFF3:UI=1.2. Forbrug i produktionen"

  - metric_code: public_social_benefits
    name_da: Sociale ydelser i naturalier
