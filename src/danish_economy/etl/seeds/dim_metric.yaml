  - metric_code: public_tax_production
    name_da: Produktions- og importskatter
    name_en: Production and import taxes
    unit: DKK_mio
    category: revenue
    subcategory: tax
    source_system: dst
    source_identifier: "OFF3:UI=2.7. Produktions- og importskatter"

  - metric_code: public_tax_income
    name_da: Løbende indkomst- og formueskatter
