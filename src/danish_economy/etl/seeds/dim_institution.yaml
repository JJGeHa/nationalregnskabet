# dim_institution seed data
#
# Hand-curated for: STAT, ministerier, major styrelser.
# Kommuner and regioner are auto-populated from DST FOLK1A register at load time.
#
# entity_key: stable business key (survives SCD2 versioning)
# parent_entity_key: references another entity_key (null for root)
# inst_type: stat | ministerium | styrelse | region | kommune
# sector_esa2010: ESA 2010 sector code
#   S1311 = central government, S1312 = state/regional government,
#   S1313 = local government, S1314 = social security funds
# geo_level: national | region | kommune (null for non-geographic units)

